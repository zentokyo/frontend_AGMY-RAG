name: Deploy production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          test -n "$PROD_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > "$RUNNER_TEMP/prod_ssh_key"
          chmod 600 "$RUNNER_TEMP/prod_ssh_key"

      - name: Deploy to VM
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_USER }}
          DEPLOY_PORT: ${{ secrets.PROD_PORT }}
          DEPLOY_KEY: ${{ runner.temp }}/prod_ssh_key
          DEPLOY_DIR: /opt/asmu-rag
        run: bash scripts/deploy-prod.sh
