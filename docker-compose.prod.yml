# ASMU RAG — production stack for a single public frontend port.
# Public surface: web-client:80. PostgreSQL, Qdrant, MinIO and FastAPI stay
# inside the Docker network.

services:
  assistant-vector-db:
    container_name: assistant-vector-db
    image: docker.m.daocloud.io/qdrant/qdrant:v1.18.1
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  assistant_db:
    container_name: assistant_db
    image: docker.m.daocloud.io/library/postgres:17-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example}
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
    volumes:
      - assistant_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-assistant}']
      interval: 5s
      timeout: 5s
      retries: 5

  assistant-file-storage:
    container_name: assistant-file-storage
    image: docker.m.daocloud.io/minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD:-minioadmin}
      MINIO_ADDRESS: :${S3_PORT:-9000}
      MINIO_CONSOLE_ADDRESS: :9001
    volumes:
      - minio_data:/data
    entrypoint: minio server /data

  create-buckets:
    container_name: create-buckets
    image: docker.m.daocloud.io/minio/mc
    depends_on:
      - assistant-file-storage
    volumes:
      - ./theme_files:/theme_files:ro
    entrypoint: >
      /bin/bash -c "
      sleep 3;
      /usr/bin/mc alias set myminio http://assistant-file-storage:${S3_PORT:-9000} ${S3_USER:-minioadmin} ${S3_PASSWORD:-minioadmin};
      /usr/bin/mc mb --ignore-existing myminio/${S3_BUCKET:-assistant};
      /usr/bin/mc cp --recursive /theme_files/* myminio/${S3_BUCKET:-assistant} 2>/dev/null || true;
      exit 0;
      "

  assistant_backend:
    container_name: assistant_backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      assistant_db:
        condition: service_healthy
      assistant-vector-db:
        condition: service_started
      assistant-file-storage:
        condition: service_started
      create-buckets:
        condition: service_completed_successfully
    environment:
      QDRANT_URL: http://assistant-vector-db:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-assistant_knowledge}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-2560}
      GIGACHAT_EMBEDDINGS_MODEL: ${GIGACHAT_EMBEDDINGS_MODEL:-EmbeddingsGigaR}
      RAG_INGEST_MAX_ATTEMPTS: ${RAG_INGEST_MAX_ATTEMPTS:-3}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-internal-token}
      JWT_SECRET: ${JWT_SECRET:-change_me_access_use_long_random_string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_different_long_random_string}
      ACCESS_TOKEN_EXPIRES: ${ACCESS_TOKEN_EXPIRES:-15m}
      REFRESH_TOKEN_EXPIRES: ${REFRESH_TOKEN_EXPIRES:-7d}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      KB_PATH: /app/src/core/rag/knowledge_base
      THEME_FILES: /theme_files
    volumes:
      - ./theme_files:/theme_files:ro

  assistant_ingest_worker:
    container_name: assistant_ingest_worker
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      assistant_backend:
        condition: service_started
      assistant_db:
        condition: service_healthy
      assistant-vector-db:
        condition: service_started
      assistant-file-storage:
        condition: service_started
    environment:
      QDRANT_URL: http://assistant-vector-db:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-assistant_knowledge}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-2560}
      GIGACHAT_EMBEDDINGS_MODEL: ${GIGACHAT_EMBEDDINGS_MODEL:-EmbeddingsGigaR}
      RAG_INGEST_MAX_ATTEMPTS: ${RAG_INGEST_MAX_ATTEMPTS:-3}
      KB_PATH: /app/src/core/rag/knowledge_base
    command: ["sh", "-c", "exec python -m src.cli.ingest_worker"]

  web-client:
    container_name: web-client
    build:
      context: .
      dockerfile: apps/web-frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PUBLISHED_PORT:-80}:80"
    depends_on:
      assistant_backend:
        condition: service_started

volumes:
  minio_data:
  assistant_pgdata:
  qdrant_storage:
