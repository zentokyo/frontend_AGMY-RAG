# ASMU RAG — единый стек: PostgreSQL, MinIO, FastAPI, Telegram-бот и React-фронтенды
# Скопируйте .env.example → .env и при необходимости поправьте секреты.

services:

  # ── Vector Database (Qdrant) ──────────────────────────────────────────────
  assistant-vector-db:
    container_name: assistant-vector-db
    image: docker.m.daocloud.io/qdrant/qdrant:v1.18.1
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  assistant_db:
    container_name: assistant_db
    image: docker.m.daocloud.io/library/postgres:17-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example}
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
    volumes:
      - assistant_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5433}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-assistant}']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-совместимое хранилище) ─────────────────────────────────────
  assistant-file-storage:
    container_name: assistant-file-storage
    image: docker.m.daocloud.io/minio/minio:latest
    restart: unless-stopped
    ports:
      - '${S3_PORT:-9000}:${S3_PORT:-9000}'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${S3_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD:-minioadmin}
      MINIO_ADDRESS: :${S3_PORT:-9000}
      MINIO_CONSOLE_ADDRESS: :9001
    volumes:
      - minio_data:/data
    entrypoint: minio server /data

  # ── Инициализация MinIO (бакеты + файлы) ─────────────────────────────────
  create-buckets:
    container_name: create-buckets
    image: docker.m.daocloud.io/minio/mc
    depends_on:
      - assistant-file-storage
    volumes:
      - ./theme_files:/theme_files:ro
    entrypoint: >
      /bin/bash -c "
      sleep 3;
      /usr/bin/mc alias set myminio http://assistant-file-storage:${S3_PORT:-9000} ${S3_USER:-minioadmin} ${S3_PASSWORD:-minioadmin};
      /usr/bin/mc mb --ignore-existing myminio/${S3_BUCKET:-assistant};
      /usr/bin/mc cp --recursive /theme_files/* myminio/${S3_BUCKET:-assistant} 2>/dev/null || true;
      exit 0;
      "

  # ── Python FastAPI: основное RAG-ядро ─────────────────────────────────────
  assistant_backend:
    container_name: assistant_backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      assistant_db:
        condition: service_healthy
      assistant-vector-db:
        condition: service_started
      assistant-file-storage:
        condition: service_started
    environment:
      QDRANT_URL: http://assistant-vector-db:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-assistant_knowledge}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-2560}
      GIGACHAT_EMBEDDINGS_MODEL: ${GIGACHAT_EMBEDDINGS_MODEL:-EmbeddingsGigaR}
      RAG_INGEST_MAX_ATTEMPTS: ${RAG_INGEST_MAX_ATTEMPTS:-3}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-internal-token}
      JWT_SECRET: ${JWT_SECRET:-change_me_access_use_long_random_string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_different_long_random_string}
      ACCESS_TOKEN_EXPIRES: ${ACCESS_TOKEN_EXPIRES:-15m}
      REFRESH_TOKEN_EXPIRES: ${REFRESH_TOKEN_EXPIRES:-7d}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5174,http://127.0.0.1:5174}
      KB_PATH: /app/src/core/rag/knowledge_base
    ports:
      - '${FASTAPI_PUBLISHED_PORT:-8001}:8000'

  # ── Durable worker: обработка ingest_job из PostgreSQL ───────────────────
  assistant_ingest_worker:
    container_name: assistant_ingest_worker
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      assistant_db:
        condition: service_healthy
      assistant-vector-db:
        condition: service_started
      assistant-file-storage:
        condition: service_started
    environment:
      QDRANT_URL: http://assistant-vector-db:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-assistant_knowledge}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-2560}
      GIGACHAT_EMBEDDINGS_MODEL: ${GIGACHAT_EMBEDDINGS_MODEL:-EmbeddingsGigaR}
      RAG_INGEST_MAX_ATTEMPTS: ${RAG_INGEST_MAX_ATTEMPTS:-3}
      KB_PATH: /app/src/core/rag/knowledge_base
    command: ["sh", "-c", "python -m src.cli.migrate && exec python -m src.cli.ingest_worker"]

  # ── Telegram-бот (устаревает, будет удалён) ───────────────────────────────
  assistant_bot:
    container_name: assistant_bot
    build:
      context: ./converters/bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      - assistant_backend

  # ── Локальная разработка фронтов: чат /, админка /admin ─────────────────
  web-client-dev:
    profiles: ['dev']
    build:
      context: .
      dockerfile: apps/web-frontend/Dockerfile.dev
    restart: unless-stopped
    ports:
      - '5174:5174'
    volumes:
      - ./apps/admin-frontend:/workspace/apps/admin-frontend
      - /workspace/apps/admin-frontend/node_modules
      - ./apps/chat-frontend:/workspace/apps/chat-frontend
      - /workspace/apps/chat-frontend/node_modules
      - ./apps/web-frontend:/workspace/apps/web-frontend
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 5174
      VITE_API_BASE: http://127.0.0.1:8001/api
    depends_on:
      - assistant_backend

volumes:
  minio_data:
  assistant_pgdata:
  qdrant_storage:
